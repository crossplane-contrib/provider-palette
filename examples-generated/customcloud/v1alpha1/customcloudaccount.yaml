apiVersion: customcloud.palette.crossplane.io/v1alpha1
kind: CustomCloudAccount
metadata:
  annotations:
    meta.upbound.io/example-id: customcloud/v1alpha1/customcloudaccount
  labels:
    testing.upbound.io/example-name: cloud_account
  name: cloud-account
spec:
  forProvider:
    cloud: nutanix
    context: tenant
    credentialsSecretRef:
      key: example-key
      name: example-secret
      namespace: upbound-system
    name: test-custom-cloud-account
    privateCloudGatewayId: ${data.spectrocloud_private_cloud_gateway.nutanix_pcg.id}
